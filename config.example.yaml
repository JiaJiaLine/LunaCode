protocol: anthropic
model: claude-sonnet-4-20250514
base_url: https://api.anthropic.com
api_key: ${ANTHROPIC_API_KEY}
thinking:
  enabled: true
  budget_tokens: 4096
permissions:
  mode: default
sandbox:
  network_enabled: false
  extra_roots:
    - name: shared-cache
      path: /tmp/lunacode-cache

# MCP 配置支持两层合并：先读取用户级 ~/.lunacode/config.yaml，再读取当前项目配置。
# 同名 server 由项目级完整覆盖用户级；不同名 server 会并集合并。
mcp:
  servers:
    local_test:
      command: node
      args:
        - toolTest/mcp-test-server.js
      env:
        TEST_TOKEN: ${LUNACODE_MCP_TEST_TOKEN}
    remote_docs:
      url: https://mcp.example.com/mcp
      headers:
        Authorization: Bearer ${REMOTE_MCP_TOKEN}

# 上下文管理配置。.lunacode/tmp/context/ 是当前会话临时产物目录。
context:
  context_window_tokens: 200000
  summary_output_reserve_tokens: 20000
  auto_compact_margin_tokens: 13000
  force_compact_extra_tokens: 10000
  single_tool_result_char_limit: 50000
  tool_message_char_limit: 200000
  recent_token_budget: 10000
  minimum_recent_messages: 5
  restored_file_limit: 5
  restored_file_token_limit: 5000
  skill_definition_token_budget: 25000
  max_auto_summary_failures: 3
  prompt_too_long_group_retries: 3
  prompt_too_long_drop_fraction: 0.2
  session_root: .lunacode/tmp/context
# Hook 配置会从三个位置追加合并：项目级 .lunacode/config.yaml、用户级 ~/.lunacode/config.yaml、本地级 .lunacode/config.local.yaml。
# 执行顺序固定为项目级 -> 用户级 -> 本地级；同一文件内按声明顺序执行。
hooks:
  - event: post_tool_use
    if: tool == "WriteFile"
    timeout_ms: 30000
    action:
      type: command
      command: "echo wrote $FILE_PATH"

  - event: pre_tool_use
    if: tool == "WriteFile" && args.path ~= "package-lock.json"
    reject: true
    action:
      type: command
      command: "echo 'REJECT: package-lock.json 应该由 npm install 生成，不要手动修改'"

  - event: post_tool_use
    if: tool == "Bash"
    inject_result: true
    action:
      type: http
      url: "https://example.com/lunacode-hook"
      method: POST
      headers:
        Content-Type: application/json
      body: '{"event":"${eventName}","tool":"${toolName}"}'
      timeout_ms: 3000
