<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>毛毛商店 — 宠物用品精选</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 顶部导航 -->
  <header class="header">
    <div class="header__inner">
      <a href="#" class="logo">
        <span class="logo__mark"></span>
        毛毛商店
      </a>
      <nav class="header__actions">
        <button class="icon-btn" aria-label="搜索">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <circle cx="9" cy="9" r="5.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M13 13L17 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="icon-btn" aria-label="购物车">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M3 4H5L6 13H16L18 6H5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="7" cy="16" r="1" fill="currentColor"/>
            <circle cx="15" cy="16" r="1" fill="currentColor"/>
          </svg>
        </button>
      </nav>
    </div>
  </header>

  <main class="main">

    <!-- 分类标签 -->
    <section class="categories">
      <div class="categories__inner">
        <button class="pill pill--active" data-category="all">全部</button>
        <button class="pill" data-category="cat">🐱 猫咪</button>
        <button class="pill" data-category="dog">🐶 狗狗</button>
        <button class="pill" data-category="small-pet">🐹 小宠</button>
        <button class="pill" data-category="food">🍖 食品</button>
        <button class="pill" data-category="accessories">🎀 配件</button>
      </div>
    </section>

    <!-- 商品网格 -->
    <section class="products">
      <div class="products__grid" id="productGrid">
        <!-- 由 JS 动态渲染 -->
      </div>
    </section>

  </main>

  <!-- 底部 -->
  <footer class="footer">
    <div class="footer__inner">
      <p class="footer__text">© 2026 毛毛商店 — 让毛孩子吃好点</p>
    </div>
  </footer>

  <script src="main.js"></script>
</body>
</html>
